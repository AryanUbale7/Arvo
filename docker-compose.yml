version: "3.9"

services:

  postgres:
    image: postgres:17
    container_name: arvo-postgres

    restart: always

    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend

    container_name: arvo-backend

    restart: always

    env_file:
      - .env

    ports:
      - "8000:8000"

    depends_on:
      - postgres

    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend

    container_name: arvo-frontend

    restart: always

    ports:
      - "3000:3000"

    depends_on:
      - backend

    environment:
      - BACKEND_URL=http://backend:8000

    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data: